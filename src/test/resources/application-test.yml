spring:
  datasource:
    url: jdbc:h2:mem:partition_mate;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false
        format_sql: false

jwt:
  secret: test_secret_key_for_partition_mate_12345678901234567890
  expiration: 3600000
  refresh-expiration: 1209600000

app:
  seed:
    stores:
      enabled: false

auth:
  refresh:
    cookie-name: pm_refresh_token
    cookie-secure: false
    cookie-same-site: Lax
