# application.yml

spring:
  application:
    name: partition-mate

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/partition_mate?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:qwe123}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        show_sql: ${JPA_SHOW_SQL:true}
        format_sql: ${JPA_FORMAT_SQL:true}
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

jwt:
  secret: ${JWT_SECRET_KEY:local_dev_secret_key_for_partition_mate_12345678901234567890}
  expiration: ${JWT_EXPIRATION_MS:3600000}
